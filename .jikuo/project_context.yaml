schema_version: "jikuo.project_context.v0"
project:
  project_id: "jikuo"
  project_type: "standalone_package"
  project_root_policy: "bindings_must_resolve_inside_project_root"
document_roles:
  project_context:
    path: ".jikuo/project_context.yaml"
    required: true
    note: "Canonical project-local document and directory role bindings."
  root_readme:
    path: "README.md"
    required: true
    note: "Product-facing repository entry point shown on GitHub private preview and future public review pages."
  docs_entry:
    path: "docs/README.md"
    required: true
    note: "Standalone repository documentation entry point and directory layout."
  execution_mounts:
    path: "docs/governance/jikuo_execution_mounts.md"
    required: true
    note: "Required active mount set and slice-completion document checks."
  program_level_roadmap_anchor:
    path: "docs/governance/jikuo_execution_mounts.md"
    required: true
    note: "Short program-level roadmap anchor in the execution mounts document. New sessions should read it alongside current slice / work-order anchors so they do not mistake a local POLTRIG or DOCREG slice for the whole JIKUO roadmap."
  latest_todo_map:
    path: "docs/governance/jikuo_productization_task_map.md"
    required: true
    note: "Legacy L3 human-readable roadmap projection. Do not add new task sequencing, open-item facts, capability metadata, or registry authority here by default; use the DOCREG transition work order and docs/registry shards unless explicitly regenerating or repairing this projection."
  document_registry_transition_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-DOCREG-01_layered_document_registry.md"
    required: true
    note: "Transitional source of truth for the DOCREG task sequence until docs/registry/registry_index.yaml and first shards exist."
  registry_index:
    path: "docs/registry/registry_index.yaml"
    required: true
    note: "Draft L0 document-registry index introduced by DOCREG-01A; source-of-truth shard routing during the registry migration."
  previous_todo_map:
    path: null
    required: false
    status: "not_implemented_in_v0"
    replacement: "future_snapshot_rotation"
    note: "Disabled in v0; do not treat latest-vs-previous todo comparison as available until snapshot rotation writes a real previous snapshot."
  rule_registry:
    path: "docs/governance/rule_registry.yaml"
    required: true
  policy_aware_agent_flow_contract:
    path: "docs/governance/jikuo_policy_aware_agent_flow_contract.md"
    required: true
  policy_governance_authority:
    path: "docs/governance/jikuo_policy_governance_authority.md"
    required: true
    note: "Current authority for policy lifecycle, source boundaries, trigger routing, AI hint handling, deterministic signal priority, and fallback expansion."
  scenario_chain_atom_registration_guide:
    path: "docs/governance/jikuo_scenario_chain_and_atom_registration_guide.md"
    required: true
    note: "Guidance for registering complete user operation chains, structured scenario-chain entries, atom/capability refs, and mount coverage after feature work."
  policy_trigger_scope_evaluator_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-POLTRIG-03_policy_scope_evaluator_consumption.md"
    required: true
    note: "Planned POLTRIG evaluator-consumption task. Mount with MOUNT-POLICY-TRIGGER-DEAD-ZONE-REPAIR and stop before behavior change review."
  project_context_contract:
    path: "docs/governance/jikuo_project_context_binding_and_policy_template_portability.md"
    required: true
  skeleton_kernel_boundary:
    path: "docs/governance/jikuo_skeleton_kernel_boundary_and_backlog.md"
    required: true
  trust_privacy_provenance_baseline:
    path: "docs/governance/jikuo_trust_privacy_provenance_baseline.md"
    required: true
  integration_neutrality_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-ARCH-02_integration_neutrality_and_integrations_layout.md"
    required: true
    note: "Immediate pre-MCP contract for integration-neutral core APIs and src/jikuo/integrations/ layout."
  mcp_api_neutrality_review_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-ARCH-03_mcp_pre_implementation_api_neutrality_review.md"
    required: true
    note: "Pre-MCP review of callable core APIs, display/runtime visibility reuse, and remaining blockers before MCP implementation."
  agent_sdk_adapter_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-SDK-01_agent_sdk_adapter_exploration.md"
    required: true
    note: "Pre-MCP posture for optional Agent SDK and agentic platform adapters."
  universal_instruction_distribution_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-INTG-01_universal_instruction_file_distribution.md"
    required: true
    note: "Pre-MCP cross-client instruction file distribution contract and implementation record."
  client_onboarding_settings_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-INTG-02_client_onboarding_settings_and_trigger_mode.md"
    required: true
    note: "Client activation settings, trigger-mode selection, and strict mounted-vs-semantic onboarding contract."
  reviewed_configuration_onboarding_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-INIT-02_reviewed_configuration_onboarding.md"
    required: true
    note: "First active-use onboarding contract distinguishing implicit defaults, unreviewed legacy settings, reviewed defaults, and user-configured activation settings."
  strict_mounted_harness_adapter_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-INTG-03_strict_mounted_harness_adapter_contract.md"
    required: true
    note: "Contract for host adapters that turn mounted mode from instruction-only behavior into pre-turn JIKUO execution."
  codex_plugin_harness_review_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-CODEX-PLUGIN-01_codex_plugin_pre_turn_harness_review.md"
    required: true
    note: "Codex proof task for determining whether plugin / hook surfaces can provide strict pre-turn JIKUO execution or only instruction / MCP setup assistance."
  ai_semantic_routing_mvp_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-AI-SEMROUTE-01_ai_semantic_routing_mvp.md"
    required: true
    note: "MVP contract for host_semantic_intent, ordered intent_slices, stable policy_scopes, Sampling fallback posture, and evaluator non-consumption boundary."
  host_adapter_contract_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-HOSTADAPT-01_host_adapter_contract.md"
    required: true
    note: "Cross-client Host Adapter Turn Input/Result contract and Codex implementation path anchor for future wrapper/plugin work."
  claude_hook_harness_review_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-CLAUDE-HOOK-01_claude_hook_strict_adapter_review.md"
    required: true
    note: "Claude proof task for determining whether a hook-capable host can run JIKUO before every user turn and surface cards / runtime links without overclaiming strict mounted support."
  self_bootstrap_stable_execution_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-SELF-BOOTSTRAP-02_stable_self_bootstrap_execution_strategy.md"
    required: true
    note: "Stable self-bootstrap strategy for making JIKUO development consistently invoke route/config/task-start/completion-review tooling instead of relying on assistant memory."
  self_bootstrap_harness_workspace_boundary_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-SELF-BOOTSTRAP-03_harness_workspace_boundary_spike.md"
    required: true
    note: "Spike for testing whether self-bootstrap should use a parent harness workspace with child source repositories before any source-directory migration."
  self_bootstrap_harness_workspace_boundary_insight:
    path: "docs/insights/INSIGHT-2026-05-17-self-bootstrap-harness-workspace-boundary.md"
    required: false
    note: "Captured insight that JIKUO harness state may belong at a workspace boundary rather than inside the source repository being governed."
  trigger_mode_conversation_router_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-ROUTER-01_trigger_mode_and_conversation_turn_router.md"
    required: true
    note: "Conversation-level trigger-mode and router contract required before implementing mounted harness or policy-suggestion router surfaces."
  completion_review_policy_only_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-14_completion_review_policy_only_surfacing.md"
    required: true
    note: "Pre-MCP follow-up for completion-review policy surfacing independent of task-session lifecycle availability."
  self_bootstrap_task_session_binding_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-15_self_bootstrap_task_session_binding.md"
    required: true
    note: "Pre-MCP follow-up requiring each governed JIKUO development slice to bind, create, or explicitly defer a task-session."
  governed_slice_task_session_resolution_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-21_governed_slice_task_session_resolution.md"
    required: true
    note: "Hardening slice that makes task-session resolution visible for every governed task_start, including documentation and registry work."
  policy_runtime_card_priority_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-16_policy_runtime_card_priority.md"
    required: true
    note: "Pre-MCP follow-up making policy_runtime_status the first visible governance card in chat-ready and runtime output."
  task_session_index_stale_hint_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-17_task_session_index_stale_hint.md"
    required: true
    note: "Pre-MCP follow-up keeping latest_task_session_refs refresh separate while making stale task-session indexes visible in jikuo show."
  previous_latest_todo_snapshot_posture_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-18_previous_latest_todo_snapshot_posture.md"
    required: true
    note: "Pre-MCP follow-up disabling fake previous_todo_map binding until snapshot rotation exists."
  starter_policy_provenance_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-19_starter_policy_provenance_backfill.md"
    required: true
    note: "Pre-MCP follow-up backfilling explicit package provenance onto official starter policies."
  self_bootstrap_policy_promotion_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-POLICY-CATALOG-01_self_bootstrap_policy_promotion_review.md"
    required: true
    note: "Code-level boundary preventing JIKUO self-bootstrap policies from becoming an implicit upstream source for user project policies."
  mcp_response_privacy_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-SEC-02_mcp_response_privacy_classification_baseline.md"
    required: true
    note: "Pre-MCP trust/privacy follow-up defining field-level MCP response privacy classification and startup checklist requirements."
  desktop_operating_loop_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-FLOW-02_desktop_app_primary_operating_loop.md"
    required: true
  insights_registry:
    path: "docs/insights/insights_registry.yaml"
    required: true
  studio_dashboard_frontend_architecture_insight:
    path: "docs/insights/INSIGHT-2026-05-16-studio-dashboard-frontend-architecture.md"
    required: false
    note: "Promoted into JIKUO-STUDIO-01; mount before dashboard / Studio architecture or implementation slices."
  studio_global_console_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-STUDIO-01_global_console_and_configuration_shell.md"
    required: false
    note: "Global JIKUO console / Studio design anchor: view-model first, action registry second, thin local UI third; not a policy-only frontend."
  mvp_work_receipt_configuration_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-MVP-01_work_receipt_and_configuration_mvp.md"
    required: true
    note: "Current MVP sequence for shipping a usable configuration CRUD surface plus an independently checkable AI work receipt viewer. Mount with MOUNT-MVP-WORK-RECEIPT-CONFIGURATION before MVP implementation."
  structured_execution_event_ledger_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-DATA-01_structured_execution_event_ledger_and_analytics_contract.md"
    required: true
    note: "Future dashboard / BI / support-bundle data contract; mount before analytics, runtime event persistence, or Studio data-model work."
  mcp_client_configuration_examples:
    path: "docs/integrations/mcp_client_configuration_examples.md"
    required: true
    note: "Reusable local stdio MCP configuration examples and smoke checklist for supported desktop clients."
  mcp_client_proof_playbook:
    path: "docs/integrations/mcp_client_proof_playbook.md"
    required: true
    note: "Manual user-facing proof workflow for Claude Code GUI, Codex, Cursor, and VS Code Copilot MCP support; current private GitHub preview remote is https://github.com/jikuo-studio/jikuo.git."
  narrativesystem_resource_pool_handoff:
    path: "docs/migration/NARRATIVESYSTEM_RESOURCE_POOL_HANDOFF.md"
    required: true
    note: "JIKUO-side handoff proving active references to old NarrativeSystem JIKUO docs/tools have been cleared before archiving the incubation resource pool."
  policy_manifest:
    path: ".jikuo/policies/manifest.yaml"
    required: true
    note: "Check before slice completion when policy-store refs changed."
main_document_mounts:
  canonical_path_root: "."
  path_policy: "standalone_repo_paths_only"
  active_mount_authority: [".jikuo/project_context.yaml", "docs/governance/jikuo_execution_mounts.md"]
  checked_before_slice_completion:
    - path: "docs/registry/registry_index.yaml"
      update_required_when: "registry shard authority, projection metadata, or impact-tag routing changes"
    - path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-DOCREG-01_layered_document_registry.md"
      update_required_when: "documentation registry scope, current DOCREG task sequence, or self-bootstrap hierarchy deferment changes before registry shards exist"
    - path: ".jikuo/project_context.yaml"
      update_required_when: "document roles, directory roles, mount policy, or completion-check scope changes"
    - path: "README.md"
      update_required_when: "product-facing project status, quickstart, MCP surface, release posture, or GitHub preview path changes"
    - path: "docs/README.md"
      update_required_when: "documentation roots, entry points, or directory responsibilities change"
    - path: "docs/governance/jikuo_execution_mounts.md"
      update_required_when: "required mounts, execution order, command previews, program-level roadmap anchor, or active context changes"
    - path: "docs/governance/jikuo_policy_governance_authority.md"
      update_required_when: "policy lifecycle, source boundary, trigger routing, task classification, AI hint, deterministic signal priority, fallback expansion, or policy distribution posture changes"
    - path: "docs/governance/jikuo_scenario_chain_and_atom_registration_guide.md"
      update_required_when: "scenario-chain registration rules, atom registration evidence expectations, corresponding-document selection, or mount coverage policy changes"
    - path: "docs/governance/jikuo_productization_task_map.md"
      update_required_when: "explicit task-map projection repair, link fix, frozen-section notice, or approved regeneration; new task sequencing, open-item facts, capability metadata, and registry authority belong in DOCREG work orders or docs/registry shards"
    - path: "docs/insights/insights_registry.yaml"
      update_required_when: "development ideas are captured, promoted, resolved, deferred, or reclassified"
    - path: ".jikuo/policies/manifest.yaml"
      update_required_when: "approved, deprecated, superseded, or proposal policy refs change"
  unchanged_report_required: true
  scope_change_rule: "User may shrink, expand, or change this maintained main-document scope by explicit approval."
directory_roles:
  governance_docs:
    path: "docs/governance"
    required: true
  work_orders:
    path: "docs/work_orders"
    required: true
  development_insights:
    path: "docs/insights"
    required: true
  migration_handoffs:
    path: "docs/migration"
    required: false
    note: "Source-project archive and migration handoff records. These are not runtime authority unless a work order explicitly mounts them."
  document_registry:
    path: "docs/registry"
    required: true
    note: "Draft machine-readable document registry shards introduced by DOCREG-01A."
  policy_store:
    path: ".jikuo/policies"
    required: true
  approved_policies:
    path: ".jikuo/policies/approved"
    required: true
  runtime_visibility:
    path: ".jikuo/runtime"
    required: false
    note: "Out-of-band runtime visibility channel root for JIKUO-LIVE-12; ignored local projection files are surfaced through jikuo show and client_display_links."
  structured_execution_events:
    path: ".jikuo/events"
    required: false
    status: "planned_by_DATA_01"
    note: "Future local append-only structured execution ledger for dashboard, BI, support bundles, and audit projections. Do not treat as implemented until DATA-01 schema and write slices are accepted."
  task_sessions:
    path: ".jikuo/task_sessions"
    required: false
    note: "Project-local durable task-session records. LIVE-15 created the first self-bootstrap task-session; latest_task_session_refs refresh remains a separate guarded action."
  source_package:
    path: "src/jikuo"
    required: true
  integrations_package:
    path: "src/jikuo/integrations"
    required: true
    note: "Adapter root for integration-specific code; created by INTG-01 and reserved for MCP, Agent SDK, client, IDE, and platform integrations."
  package_policy_templates:
    path: "src/jikuo/policy_templates/engineering_governance"
    required: true
  tests:
    path: "tests"
    required: true
naming_conventions:
  work_order_pattern: "SPRINT_*_WO-*"
  policy_id_prefix: "POLICY-"
  policy_template_id_prefix: "POLICYTEMPLATE-"
compatibility:
  unknown_fields: "preserve"
