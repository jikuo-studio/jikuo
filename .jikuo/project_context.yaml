schema_version: "jikuo.project_context.v0"
project:
  project_id: "jikuo"
  project_type: "standalone_package"
  project_root_policy: "bindings_must_resolve_inside_project_root"
document_roles:
  project_context:
    path: ".jikuo/project_context.yaml"
    required: true
    note: "Canonical project-local document and directory role bindings."
  docs_entry:
    path: "docs/README.md"
    required: true
    note: "Standalone repository documentation entry point and directory layout."
  execution_mounts:
    path: "docs/governance/jikuo_execution_mounts.md"
    required: true
    note: "Required active mount set and slice-completion document checks."
  latest_todo_map:
    path: "docs/governance/jikuo_productization_task_map.md"
    required: true
    note: "Current productization task map and latest todo section."
  previous_todo_map:
    path: null
    required: false
    status: "not_implemented_in_v0"
    replacement: "future_snapshot_rotation"
    note: "Disabled in v0; do not treat latest-vs-previous todo comparison as available until snapshot rotation writes a real previous snapshot."
  rule_registry:
    path: "docs/governance/rule_registry.yaml"
    required: true
  policy_aware_agent_flow_contract:
    path: "docs/governance/jikuo_policy_aware_agent_flow_contract.md"
    required: true
  project_context_contract:
    path: "docs/governance/jikuo_project_context_binding_and_policy_template_portability.md"
    required: true
  skeleton_kernel_boundary:
    path: "docs/governance/jikuo_skeleton_kernel_boundary_and_backlog.md"
    required: true
  trust_privacy_provenance_baseline:
    path: "docs/governance/jikuo_trust_privacy_provenance_baseline.md"
    required: true
  integration_neutrality_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-ARCH-02_integration_neutrality_and_integrations_layout.md"
    required: true
    note: "Immediate pre-MCP contract for integration-neutral core APIs and src/jikuo/integrations/ layout."
  mcp_api_neutrality_review_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-ARCH-03_mcp_pre_implementation_api_neutrality_review.md"
    required: true
    note: "Pre-MCP review of callable core APIs, display/runtime visibility reuse, and remaining blockers before MCP implementation."
  agent_sdk_adapter_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-SDK-01_agent_sdk_adapter_exploration.md"
    required: true
    note: "Pre-MCP posture for optional Agent SDK and agentic platform adapters."
  universal_instruction_distribution_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-INTG-01_universal_instruction_file_distribution.md"
    required: true
    note: "Pre-MCP cross-client instruction file distribution contract and implementation record."
  completion_review_policy_only_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-14_completion_review_policy_only_surfacing.md"
    required: true
    note: "Pre-MCP follow-up for completion-review policy surfacing independent of task-session lifecycle availability."
  self_bootstrap_task_session_binding_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-15_self_bootstrap_task_session_binding.md"
    required: true
    note: "Pre-MCP follow-up requiring each governed JIKUO development slice to bind, create, or explicitly defer a task-session."
  policy_runtime_card_priority_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-16_policy_runtime_card_priority.md"
    required: true
    note: "Pre-MCP follow-up making policy_runtime_status the first visible governance card in chat-ready and runtime output."
  task_session_index_stale_hint_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-17_task_session_index_stale_hint.md"
    required: true
    note: "Pre-MCP follow-up keeping latest_task_session_refs refresh separate while making stale task-session indexes visible in jikuo show."
  previous_latest_todo_snapshot_posture_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-18_previous_latest_todo_snapshot_posture.md"
    required: true
    note: "Pre-MCP follow-up disabling fake previous_todo_map binding until snapshot rotation exists."
  starter_policy_provenance_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-LIVE-19_starter_policy_provenance_backfill.md"
    required: true
    note: "Pre-MCP follow-up backfilling explicit package provenance onto official starter policies."
  mcp_response_privacy_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-SEC-02_mcp_response_privacy_classification_baseline.md"
    required: true
    note: "Pre-MCP trust/privacy follow-up defining field-level MCP response privacy classification and startup checklist requirements."
  desktop_operating_loop_work_order:
    path: "docs/work_orders/SPRINT_050_WO-PER-JIKUO-FLOW-02_desktop_app_primary_operating_loop.md"
    required: true
  insights_registry:
    path: "docs/insights/insights_registry.yaml"
    required: true
  studio_dashboard_frontend_architecture_insight:
    path: "docs/insights/INSIGHT-2026-05-16-studio-dashboard-frontend-architecture.md"
    required: false
    note: "Mount before future JIKUO-STUDIO-01 dashboard / Studio architecture or implementation slices."
  policy_manifest:
    path: ".jikuo/policies/manifest.yaml"
    required: true
    note: "Check before slice completion when policy-store refs changed."
main_document_mounts:
  canonical_path_root: "."
  path_policy: "standalone_repo_paths_only"
  active_mount_authority:
    - ".jikuo/project_context.yaml"
    - "docs/governance/jikuo_execution_mounts.md"
  checked_before_slice_completion:
    - path: ".jikuo/project_context.yaml"
      update_required_when: "document roles, directory roles, mount policy, or completion-check scope changes"
    - path: "docs/README.md"
      update_required_when: "documentation roots, entry points, or directory responsibilities change"
    - path: "docs/governance/jikuo_execution_mounts.md"
      update_required_when: "required mounts, execution order, command previews, or active context changes"
    - path: "docs/governance/jikuo_productization_task_map.md"
      update_required_when: "taskmap, current snapshot, capability registry, todo list, or task/follow-up distinction changes"
    - path: "docs/insights/insights_registry.yaml"
      update_required_when: "development ideas are captured, promoted, resolved, deferred, or reclassified"
    - path: ".jikuo/policies/manifest.yaml"
      update_required_when: "approved, deprecated, superseded, or proposal policy refs change"
  unchanged_report_required: true
  scope_change_rule: "User may shrink, expand, or change this maintained main-document scope by explicit approval."
directory_roles:
  governance_docs:
    path: "docs/governance"
    required: true
  work_orders:
    path: "docs/work_orders"
    required: true
  development_insights:
    path: "docs/insights"
    required: true
  policy_store:
    path: ".jikuo/policies"
    required: true
  approved_policies:
    path: ".jikuo/policies/approved"
    required: true
  runtime_visibility:
    path: ".jikuo/runtime"
    required: false
    note: "Out-of-band runtime visibility channel root for JIKUO-LIVE-12; ignored local projection files are surfaced through jikuo show and client_display_links."
  task_sessions:
    path: ".jikuo/task_sessions"
    required: false
    note: "Project-local durable task-session records. LIVE-15 created the first self-bootstrap task-session; latest_task_session_refs refresh remains a separate guarded action."
  source_package:
    path: "src/jikuo"
    required: true
  integrations_package:
    path: "src/jikuo/integrations"
    required: true
    note: "Adapter root for integration-specific code; created by INTG-01 and reserved for MCP, Agent SDK, client, IDE, and platform integrations."
  package_policy_templates:
    path: "src/jikuo/policy_templates/engineering_governance"
    required: true
  tests:
    path: "tests"
    required: true
naming_conventions:
  work_order_pattern: "SPRINT_*_WO-*"
  policy_id_prefix: "POLICY-"
  policy_template_id_prefix: "POLICYTEMPLATE-"
compatibility:
  unknown_fields: "preserve"
