schema_version: "jikuo.configurable_rule_policy.v0"
policy_id: "POLICY-jikuo-post-feature-action-chain-atom-registration"
version: 2
status: "active_report_only"
title: "Post-feature action chain and atom registration"
scenario_package: "engineering_governance"
source_refs:
  - type: "user_natural_language"
    ref: "user_request_2026-06-02_post_feature_action_chain_atom_registration_policy_template"
triggers:
  - trigger_id: "TRG-conversation-turn"
    type: "task_lifecycle_event"
    event: "conversation_turn"
conditions: []
required_actions:
  - action_id: "ACT-restore-user-action-chain-and-register-feature-atoms"
    type: "restore_user_action_chain_and_register_feature_atoms"
    document_registration_contract: "After a user-facing feature is added or changed, select the corresponding project document(s) that own the real user operation chain and atom registration for that feature, then update or cite those documents instead of relying only on registry metadata."
    document_path_policy: "Do not hard-code document paths in this policy; resolve the corresponding documents from the current project context, document roles, work-order scope, registry authority, and mounted governance guidance."
    mount_coverage_contract: "Before completion, verify that the selected corresponding documents are covered by the active document mount scope, or update the document-rule/mount configuration so they are covered."
required_evidence:
  - evidence_id: "EVD-feature-atom-registration-evidence"
    type: "feature_atom_registration_evidence"
    satisfies_action: "ACT-restore-user-action-chain-and-register-feature-atoms"
    evidence_contract: "Evidence must identify the corresponding document(s) used, summarize the actual user operation chain, list the decomposed atom(s) or capability IDs, and state how active mount coverage was verified."
enforcement:
  phase: "report_only"
  level: "review_required"
applies_to_work_profile:
  - lifecycle_events: []
    policy_scopes: ["editing"]
