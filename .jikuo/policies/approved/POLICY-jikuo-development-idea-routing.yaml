schema_version: "jikuo.configurable_rule_policy.v0"
policy_id: "POLICY-jikuo-development-idea-routing"
version: 1
status: "active_report_only"
title: "Development idea routing before JIKUO implementation"
scenario_package: "engineering_governance"
source_refs:
  - type: "user_natural_language"
    ref: "user_policy:development_ideas_must_be_classified_as_tasks_or_insights"
triggers:
  - trigger_id: "TRG-task-start"
    type: "task_lifecycle_event"
    event: "task_start"
conditions:
  - condition_id: "COND-policy-jikuo-development-idea-routing-task-type"
    type: "task_type_is"
    value: "code_change"
  - condition_id: "COND-policy-jikuo-development-idea-routing-jikuo-layer"
    type: "jikuo_layer_is"
    value: "implementation_governance"
required_actions:
  - action_id: "ACT-classify-development-idea-as-task-or-insight-and-update-docs"
    type: "classify_development_idea_as_task_or_insight_and_update_docs"
required_evidence:
  - evidence_id: "EVD-development-idea-classification-evidence"
    type: "development_idea_classification_evidence"
    satisfies_action: "ACT-classify-development-idea-as-task-or-insight-and-update-docs"
enforcement:
  phase: "report_only"
  level: "review_required"
