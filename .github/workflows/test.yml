name: tests

on:
  push:
  pull_request:

env:
  # Exercise JavaScript actions on Node 24 ahead of GitHub's default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  unit-tests:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run unittest suite
        run: python -B -m unittest discover -s tests -p "*_tests.py"

      - name: Run pytest entry point
        run: pytest
