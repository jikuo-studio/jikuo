schema_version: "jikuo.registry.v0_draft"
registry_id: "jikuo-scenario-chains"
entries:
  - id: "SCENARIO-DESKTOP-TASK-START"
    title: "Desktop task start governance loop"
    status: "seed"
    capability_refs:
      - "CAP-CONVERSATION-TURN-ROUTER-01"
      - "CAP-AGENT-FLOW-01"
      - "CAP-TASK-START-DRYRUN-01"
      - "CAP-POLICY-RUNTIME-STATUS-CARD-01"
  - id: "SCENARIO-MCP-RUNTIME-VISIBILITY"
    title: "MCP runtime status and card visibility"
    status: "seed"
    capability_refs:
      - "CAP-MCP-AGENT-FLOW-WRAPPER-01"
      - "CAP-MCP-RUNTIME-STATUS-CARD-01"
      - "CAP-RUNTIME-VISIBILITY-CHANNEL-01"
      - "CAP-CLIENT-RUNTIME-LINK-SURFACE-01"
  - id: "SCENARIO-FIRST-USE-ONBOARDING"
    title: "First-use configuration and activation settings review"
    status: "seed"
    capability_refs:
      - "CAP-CONFIGURATION-REVIEW-01"
      - "CAP-CLIENT-ONBOARDING-SETTINGS-01"
      - "CAP-CONFIGURATION-SOURCE-PROVENANCE-01"
  - id: "SCENARIO-HOST-SEMANTIC-FOLLOW-UP"
    title: "Host semantic intent follow-up for governed turns"
    status: "implemented"
    user_outcome: "A user who asks for progress, todos, policy work, or edits gets JIKUO routing based on host-provided semantic evidence after the host AI has read the turn, without JIKUO pretending to classify the prompt itself."
    corresponding_document_refs:
      - "docs/work_orders/SPRINT_050_WO-PER-JIKUO-AI-SEMROUTE-01_ai_semantic_routing_mvp.md"
      - "docs/work_orders/SPRINT_050_WO-PER-JIKUO-STUDIO-01_global_console_and_configuration_shell.md"
      - ".codex/hooks/README.md"
    mount_coverage:
      status: "verified"
      refs:
        - "MOUNT-STRICT-HARNESS-PROOF"
        - "MOUNT-SCENARIO-CHAIN-ATOM-REGISTRATION"
    steps:
      - step_id: "HOST-SEMANTIC-FOLLOW-UP-01"
        user_action: "Submit a turn that asks for progress summary, todos, policy work, or implementation."
        visible_result: "The pre-turn Codex hook reports whether host semantic intent was already supplied and instructs the host AI to provide compact intent before follow-up JIKUO calls."
        operation_chain: "Codex UserPromptSubmit invokes JIKUO conversation_turn, projects runtime links, and renders the post-start host_semantic_intent follow-up contract in additionalContext without storing the raw prompt; hook output is display-safe even when host input contains isolated surrogate code units."
        atom_refs:
          - "CAP-CODEX-PLUGIN-HARNESS-REVIEW-01"
          - "CAP-HOST-ADAPTER-CONTRACT-01"
          - "CAP-SEMANTIC-INTENT-CLASSIFICATION-EVIDENCE-01"
        approval_boundary: "no_write"
        evidence_outputs:
          - "additionalContext semantic follow-up contract"
          - "semantic_intent_status"
          - "runtime card links"
      - step_id: "HOST-SEMANTIC-FOLLOW-UP-02"
        user_action: "Host AI starts work and classifies the turn compactly."
        visible_result: "JIKUO receives `host_semantic_intent.status=provided` with MVP policy scopes, requested outcome, boundary, response contract, and a short user expression."
        operation_chain: "The host AI calls `jikuo.route_user_request`, `jikuo.propose_task_start`, or the matching proposal surface with compact `host_semantic_intent`; JIKUO normalizes it into work_profile without expanding evaluator inputs."
        atom_refs:
          - "CAP-HOST-SEMANTIC-INTENT-WORK-PROFILE-01"
          - "CAP-AI-SEMANTIC-ROUTING-MVP-01"
        approval_boundary: "no_write"
        evidence_outputs:
          - "work_profile.policy_scopes"
          - "semantic_intent_evidence.status=ok"
          - "ordered intent_slices when supplied"
      - step_id: "HOST-SEMANTIC-FOLLOW-UP-03"
        user_action: "Ask for a progress summary or todo list."
        visible_result: "The progress-summary business-meaning policy triggers from the `progress_summary` scope even when the active JIKUO surface is conversation_turn or task_start."
        operation_chain: "The progress-summary policy keeps its completion-review trigger as a compatibility anchor but removes lifecycle_events from applies_to_work_profile, so POLTRIG-04 scope-first matching can trigger it from work_profile.policy_scopes."
        atom_refs:
          - "CAP-PROGRESS-SUMMARY-BUSINESS-MEANING-POLICY-01"
          - "CAP-HOST-SEMANTIC-INTENT-WORK-PROFILE-01"
        approval_boundary: "report_only_policy_evidence"
        evidence_outputs:
          - "trigger_match_mode=work_profile_scope"
          - "matched_refs includes policy_scope:progress_summary"
          - "progress_summary_business_meaning_evidence requirement"
      - step_id: "HOST-SEMANTIC-FOLLOW-UP-04"
        user_action: "Inspect whether a GUI-subscription turn actually returned host semantic intent."
        visible_result: "Runtime and Studio show semantic-intent coverage as complete, missing, fallback_only, or degraded, and Studio summarizes whether the latest retained round was AI-classified, what intent/scopes were recorded, and which evidence limits remain without claiming strict GUI semantic gating."
        operation_chain: "Runtime visibility derives `semantic_intent_coverage` from existing work_profile semantic evidence; Studio exposes a Latest Semantic Classification card for the latest retained runtime round plus selected Round Document Trace labels so users can see when policy routing lacked explicit host semantic evidence."
        atom_refs:
          - "CAP-SEMANTIC-INTENT-COVERAGE-RUNTIME-01"
          - "CAP-SEMANTIC-INTENT-CLASSIFICATION-EVIDENCE-01"
          - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-SELECTOR-01"
        approval_boundary: "runtime_projection_and_read_only_studio_view"
        evidence_outputs:
          - "state_summary.semantic_intent_coverage"
          - "Studio latest semantic classification overview metric"
          - "Studio latest semantic classification detail list"
          - "selected round semantic coverage label"
      - step_id: "HOST-SEMANTIC-FOLLOW-UP-05"
        user_action: "Inspect whether the latest retained GUI/subscription turn has a stable non-AI identity anchor that can be carried into later task_start or completion_review receipts."
        visible_result: "Studio shows the latest turn anchor status, anchor id when available, host session/turn fields when available, and prompt digest status without exposing the raw prompt."
        operation_chain: "The host adapter builds `turn_anchor` from client id, client event, host session id, host turn id, received timestamp, and optional surrogate-safe prompt hash; Codex hook passes it to agent_flow and asks the host AI to carry the same `host_semantic_intent.turn_anchor` in later JIKUO calls; runtime state_summary and Studio project the same anchor for audit."
        atom_refs:
          - "CAP-RUNTIME-TURN-ANCHOR-PROJECTION-01"
          - "CAP-HOST-ADAPTER-CONTRACT-01"
          - "CAP-CODEX-PLUGIN-HARNESS-REVIEW-01"
        approval_boundary: "runtime_projection_and_read_only_studio_view"
        evidence_outputs:
          - "proposal.turn_anchor"
          - "state_summary.turn_anchor"
          - "Studio latest turn anchor overview metric"
          - "Studio latest semantic classification Turn anchor row"
      - step_id: "HOST-SEMANTIC-FOLLOW-UP-06"
        user_action: "Inspect whether a governed turn has a shared execution envelope and private input index ref that can link raw private input to runtime evidence without exposing it in public cards."
        visible_result: "Runtime cards and state_summary show `jikuo.execution_envelope.v0`, lifecycle state, turn anchor identity, host semantic evidence status, and private input index refs while keeping raw prompt storage private."
        operation_chain: "The host adapter creates a received-state envelope and no-write private input index ref; Codex hook and agent_flow carry the ref into task_start/completion_review proposals; runtime visibility adds latest card/history/state refs to the envelope."
        atom_refs:
          - "CAP-EXECUTION-ENVELOPE-PROJECTION-01"
          - "CAP-RUNTIME-TURN-ANCHOR-PROJECTION-01"
          - "CAP-HOST-ADAPTER-CONTRACT-01"
        approval_boundary: "runtime_projection_and_explicit_private_index_write_only"
        evidence_outputs:
          - "proposal.execution_envelope"
          - "state_summary.execution_envelope"
          - "execution_envelope.links.private_turn_input_ref"
          - "execution_envelope.links.runtime_refs"
    capability_refs:
      - "CAP-CODEX-PLUGIN-HARNESS-REVIEW-01"
      - "CAP-HOST-ADAPTER-CONTRACT-01"
      - "CAP-HOST-SEMANTIC-INTENT-WORK-PROFILE-01"
      - "CAP-AI-SEMANTIC-ROUTING-MVP-01"
      - "CAP-SEMANTIC-INTENT-CLASSIFICATION-EVIDENCE-01"
      - "CAP-SEMANTIC-INTENT-COVERAGE-RUNTIME-01"
      - "CAP-RUNTIME-TURN-ANCHOR-PROJECTION-01"
      - "CAP-EXECUTION-ENVELOPE-PROJECTION-01"
      - "CAP-PROGRESS-SUMMARY-BUSINESS-MEANING-POLICY-01"
  - id: "SCENARIO-INSTRUCTION-COMPLETION-RECEIPT"
    title: "Instruction-guided completion receipt"
    status: "implemented"
    user_outcome: "A host AI that reads generated JIKUO project instructions knows to produce a completion_review receipt after it changes workspace files, without the user manually running a receipt command."
    corresponding_document_refs:
      - "docs/work_orders/SPRINT_050_WO-PER-JIKUO-INTG-01_universal_instruction_file_distribution.md"
      - "docs/work_orders/SPRINT_050_WO-PER-JIKUO-MVP-01_work_receipt_and_configuration_mvp.md"
      - "docs/governance/jikuo_desktop_agent_instruction_pack.md"
    mount_coverage:
      status: "verified"
      refs:
        - "MOUNT-MVP-WORK-RECEIPT-CONFIGURATION"
        - "MOUNT-SCENARIO-CHAIN-ATOM-REGISTRATION"
    steps:
      - step_id: "INSTRUCTION-COMPLETION-RECEIPT-01"
        user_action: "Install or sync JIKUO project instructions for a supported host AI client."
        visible_result: "The managed instruction block includes the completion receipt obligation and preserves unrelated local instruction content."
        operation_chain: "`jikuo install` renders common_instruction_lines into JIKUO.md and selected client instruction files through the guarded instruction writer."
        atom_refs:
          - "CAP-UNIVERSAL-INSTRUCTION-FILE-01"
          - "CAP-UNIVERSAL-INSTRUCTION-COMPLETION-RECEIPT-01"
        approval_boundary: "guarded_instruction_write"
        evidence_outputs:
          - "managed instruction block"
          - "install plan/result JSON"
      - step_id: "INSTRUCTION-COMPLETION-RECEIPT-02"
        user_action: "Ask the host AI to perform work that writes files."
        visible_result: "After verification and before the final response, the host AI runs completion_review or reports that the receipt is missing or failed."
        operation_chain: "The instruction block names `python -B -m jikuo.agent_flow propose --event completion_review --project-root \"<absolute project root>\" --format json` as the routine receipt path for workspace writes."
        atom_refs:
          - "CAP-UNIVERSAL-INSTRUCTION-COMPLETION-RECEIPT-01"
          - "CAP-RUNTIME-WRITE-OBSERVATION-COMPLETION-REVIEW-01"
        approval_boundary: "no_write_completion_receipt"
        evidence_outputs:
          - "completion_review runtime card"
          - "state_summary artifact assurance"
          - "history receipt card"
      - step_id: "INSTRUCTION-COMPLETION-RECEIPT-03"
        user_action: "Open Studio after later turns have occurred."
        visible_result: "Studio can still show the latest completion receipt as the default selected round and preserve itemized evidence when a per-history state snapshot exists."
        operation_chain: "The receipt path writes runtime history/state evidence; Studio reads latest_completion_receipt_round_id and per-history state snapshots rather than relying only on the newest runtime state."
        atom_refs:
          - "CAP-STUDIO-LATEST-COMPLETION-RECEIPT-01"
          - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-SELECTOR-01"
        approval_boundary: "read_only_studio_view"
        evidence_outputs:
          - "latest completion receipt chip"
          - "selected round detail panels"
    capability_refs:
      - "CAP-UNIVERSAL-INSTRUCTION-FILE-01"
      - "CAP-UNIVERSAL-INSTRUCTION-COMPLETION-RECEIPT-01"
      - "CAP-RUNTIME-WRITE-OBSERVATION-COMPLETION-REVIEW-01"
      - "CAP-STUDIO-LATEST-COMPLETION-RECEIPT-01"
      - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-SELECTOR-01"
  - id: "SCENARIO-DOCUMENT-REGISTRY-TRANSITION"
    title: "Layered document registry migration"
    status: "seed"
    capability_refs:
      - "CAP-DOCUMENT-REGISTRY-TRANSITION-01"
      - "CAP-MAIN-DOC-MOUNT-MAINTENANCE-01"
  - id: "SCENARIO-STUDIO-ROUND-DOCUMENT-TRACE"
    title: "Studio round document trace inspection"
    status: "implemented"
    user_outcome: "A Studio user can choose a runtime round and see document expectations, observed evidence, writes, gaps, and action-chain status for that same round."
    corresponding_document_refs:
      - "docs/work_orders/SPRINT_050_WO-PER-JIKUO-STUDIO-01_global_console_and_configuration_shell.md"
    mount_coverage:
      status: "verified"
      refs:
        - "MOUNT-STUDIO-01"
        - "MOUNT-SCENARIO-CHAIN-ATOM-REGISTRATION"
    steps:
      - step_id: "STUDIO-ROUND-TRACE-01"
        user_action: "Open Studio Round Document Trace."
        visible_result: "The latest completion_review receipt is selected by default when available, and the latest runtime turn remains visible as a separate summary chip."
        operation_chain: "Studio reads summaries.runtime.round_document_traces, binds selectedRoundTraceId to default_round_id when no user selection exists, and uses latest_runtime_round_id plus latest_completion_receipt_round_id to explain the distinction."
        atom_refs:
          - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-SELECTOR-01"
          - "CAP-STUDIO-LATEST-COMPLETION-RECEIPT-01"
        approval_boundary: "read_only"
        evidence_outputs:
          - "selected round card"
          - "round trace summary chips"
      - step_id: "STUDIO-ROUND-TRACE-02"
        user_action: "Click a runtime round card."
        visible_result: "Expected, Observed, Gaps, and Action chain panels update to the clicked round."
        operation_chain: "Studio renders detail panels from the selected round artifact_assurance payload and selected-round count fields only."
        atom_refs:
          - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-01"
          - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-SELECTOR-01"
        approval_boundary: "read_only"
        evidence_outputs:
          - "selected round detail panels"
      - step_id: "STUDIO-ROUND-TRACE-03"
        user_action: "Inspect a round whose history card has counts but no itemized document paths."
        visible_result: "Studio shows the counted items and explains that detailed paths are unavailable in that history card."
        operation_chain: "Studio prefers explicit selected-round counts before array lengths and avoids falling back to global configured projection for selected no-trace rounds."
        atom_refs:
          - "CAP-STUDIO-ARTIFACT-ASSURANCE-RUNTIME-CARD-01"
          - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-SELECTOR-01"
        approval_boundary: "read_only"
        evidence_outputs:
          - "count-only detail rows"
          - "no-trace selected-round state"
      - step_id: "STUDIO-ROUND-TRACE-03A"
        user_action: "Inspect a completion receipt after later runtime turns have overwritten the latest state summary."
        visible_result: "Studio still shows the selected completion receipt's itemized required companion writes, applicable writes, actual writes, and overflow expansion controls when that receipt has a structured history snapshot."
        operation_chain: "Runtime visibility writes a same-stem history JSON state snapshot beside each Markdown history card; Studio resolves the selected history card to that structured snapshot before falling back to count-only Markdown parsing, preserving path-level receipt evidence across later conversation_turn/task_start projections."
        atom_refs:
          - "CAP-RUNTIME-VISIBILITY-CHANNEL-01"
          - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-SELECTOR-01"
          - "CAP-STUDIO-COMPANION-WRITE-RECEIPT-VIEW-01"
        approval_boundary: "read_only_runtime_projection"
        evidence_outputs:
          - "history state summary JSON"
          - "itemized selected-round detail rows"
          - "expandable overflow detail rows"
      - step_id: "STUDIO-ROUND-TRACE-04"
        user_action: "Inspect write-side governance reconciliation for a selected round."
        visible_result: "Studio shows required companion write paths, declared write paths, observed actual write paths, and path-level gaps when itemized evidence exists."
        operation_chain: "Completion review uses the companion-write obligation projector to derive required governance write paths from observed write triggers, keeps declared writes separate, preserves git-observed actual writes, and the Round Document Trace view renders the comparable path sets without inferring paths from count-only cards."
        atom_refs:
          - "CAP-RUNTIME-COMPANION-WRITE-OBLIGATION-01"
          - "CAP-RUNTIME-WRITE-OBSERVATION-COMPLETION-REVIEW-01"
          - "CAP-STUDIO-COMPANION-WRITE-RECEIPT-VIEW-01"
        approval_boundary: "read_only"
        evidence_outputs:
          - "required companion write list"
          - "declared write list"
          - "observed actual write list"
          - "companion trigger list"
          - "ignored actual-write list"
          - "path-level write gap list"
      - step_id: "STUDIO-ROUND-TRACE-05"
        user_action: "Inspect completion-check status for a selected round."
        visible_result: "Studio shows concrete Gaps separately from Unchecked applicability so unevaluated completion-check candidates are not presented as evidence mismatches."
        operation_chain: "Round Document Trace renders gap_count as the Gaps summary and renders completion_check_not_evaluated_count as Unchecked applicability, preserving the distinction between observed reconciliation gaps and missing per-document applicability decisions."
        atom_refs:
          - "CAP-STUDIO-ARTIFACT-ASSURANCE-COMPLETION-CHECK-SEMANTICS-01"
          - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-01"
        approval_boundary: "read_only"
        evidence_outputs:
          - "gap count summary chip"
          - "unchecked applicability summary chip"
          - "completion-check applicability detail rows"
      - step_id: "STUDIO-ROUND-TRACE-06"
        user_action: "Scan the Expected, Observed, and Gaps detail columns for a selected round."
        visible_result: "Each column is split into labeled subpanels so required reads, companion writes, runtime source, observed evidence, read gaps, write gaps, and unchecked applicability are visually separated; overflow rows can be expanded from the `+ N more` control."
        operation_chain: "Studio builds lightweight trace groups inside each detail column from the same selected-round artifact_assurance payload, and overflow controls reveal hidden itemized rows in place without creating a second data source or changing reconciliation semantics."
        atom_refs:
          - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-01"
          - "CAP-STUDIO-COMPANION-WRITE-RECEIPT-VIEW-01"
        approval_boundary: "read_only"
        evidence_outputs:
          - "Expected subpanel groups"
          - "Observed subpanel groups"
          - "Gaps subpanel groups"
          - "expandable overflow detail rows"
    capability_refs:
      - "CAP-STUDIO-ARTIFACT-ASSURANCE-PROJECTION-01"
      - "CAP-STUDIO-ARTIFACT-ASSURANCE-RUNTIME-CARD-01"
      - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-01"
      - "CAP-STUDIO-ROUND-DOCUMENT-TRACE-SELECTOR-01"
      - "CAP-STUDIO-LATEST-COMPLETION-RECEIPT-01"
      - "CAP-RUNTIME-COMPANION-WRITE-OBLIGATION-01"
      - "CAP-STUDIO-COMPANION-WRITE-RECEIPT-VIEW-01"
      - "CAP-STUDIO-ARTIFACT-ASSURANCE-COMPLETION-CHECK-SEMANTICS-01"
  - id: "SCENARIO-STUDIO-POLICY-CONFIGURATION"
    title: "Studio policy configuration inspection"
    status: "implemented_read_only_candidate_detail_candidate_activation_no_write_plan_guarded_trigger_refinement_template_publication_and_template_activation_slice"
    user_outcome: "A Studio user can inspect active policies as current constraints, inspect only genuinely activatable policy proposals as pending constraints, preview and apply controlled active-policy configuration changes, activate manifest-listed pending proposals, apply supported deprecation, trigger-profile refinement, or supersession changes, publish selected active policies as reusable package templates for future projects, and activate selected package templates as project policies through guarded writers."
    corresponding_document_refs:
      - "docs/work_orders/SPRINT_050_WO-PER-JIKUO-MVP-01_work_receipt_and_configuration_mvp.md"
      - "docs/work_orders/SPRINT_050_WO-PER-JIKUO-STUDIO-01_global_console_and_configuration_shell.md"
      - "docs/work_orders/SPRINT_050_WO-PER-JIKUO-POLICY-MGMT-01_policy_management_mvp.md"
    mount_coverage:
      status: "verified"
      refs:
        - "MOUNT-MVP-WORK-RECEIPT-CONFIGURATION"
        - "MOUNT-STUDIO-01"
        - "MOUNT-SCENARIO-CHAIN-ATOM-REGISTRATION"
    steps:
      - step_id: "STUDIO-POLICY-CONFIG-01"
        user_action: "Open Studio and scan the Policies And Templates section."
        visible_result: "Studio shows active policy and activatable policy counts as the primary policy-management metrics."
        operation_chain: "Studio loads /api/status for global actions, then fetches /api/policy-management/status to render the full policy-management read model without increasing the global status payload."
        atom_refs:
          - "CAP-STUDIO-POLICY-CONFIGURATION-READ-UI-01"
          - "CAP-POLICY-MANAGEMENT-STATUS-READ-01"
        approval_boundary: "read_only"
        evidence_outputs:
          - "policy-management status badge"
          - "policy-management metrics"
      - step_id: "STUDIO-POLICY-CONFIG-02"
        user_action: "Select an active policy."
        visible_result: "Studio shows the selected policy id/path/status, trigger profile, task and layer filters, path filters, required actions, required evidence, distribution state, template refs, starter refs, policy scope tags, lifecycle event tags, or a scope-first tag when no lifecycle event is declared."
        operation_chain: "The UI reads policy_store.active_policies, active_policy_details, active_policy_distribution, and option_sets from /api/policy-management/status; it renders current policy values before any active-policy configuration change preview and does not invent evaluator semantics."
        atom_refs:
          - "CAP-STUDIO-POLICY-CONFIGURATION-READ-UI-01"
          - "CAP-POLICY-MANAGEMENT-STATUS-READ-01"
        approval_boundary: "read_only"
        evidence_outputs:
          - "scope tags"
          - "event tags"
          - "scope-first tag"
          - "distribution state"
      - step_id: "STUDIO-POLICY-CONFIG-03"
        user_action: "Inspect active and activatable policy constraints."
        visible_result: "Studio shows active policies as current constraints and activatable policy proposals as pending constraints ready for review; historical proposal refs that are already active, already decided, or stale are not shown in the primary UI."
        operation_chain: "The policy-management read model keeps proposal_details as historical audit data while exposing activatable_policy_proposals as a filtered UI source; the frontend renders active_policy_details and activatable_policy_proposals as the primary policy-management columns."
        atom_refs:
          - "CAP-STUDIO-POLICY-CONFIGURATION-READ-UI-01"
          - "CAP-STUDIO-POLICY-CANDIDATE-DETAIL-READ-01"
          - "CAP-POLICY-MANAGEMENT-STATUS-READ-01"
        approval_boundary: "read_only"
        evidence_outputs:
          - "active constraint cards"
          - "activatable pending-constraint cards"
      - step_id: "STUDIO-POLICY-CONFIG-04"
        user_action: "Preview and activate a manifest-listed pending policy proposal."
        visible_result: "Studio shows the selected proposal snapshot, target policy, proposal hash, manifest status, read set, future approved-policy/decision/manifest writes, refusal reasons for already-active or lifecycle-history proposals, and guarded apply result with active-policy verification."
        operation_chain: "The frontend selects a proposal from policy_store.activatable_policy_proposals, posts proposal_id/proposal_ref to /api/policy-management/candidate-activation/plan, disables apply when the selected proposal changes, asks for confirmation, then posts the stored request, reviewed proposal hash, confirm_apply, approval phrase, and approval source to /api/policy-management/candidate-activation/apply; the web adapter delegates to policy_store.activate_policy_proposal_from_snapshot, which accepts only manifest-listed proposal snapshots under .jikuo/policies/proposals and writes the approved policy file, decision record, and manifest active ref without rewriting the proposal snapshot."
        atom_refs:
          - "CAP-STUDIO-POLICY-CANDIDATE-ACTIVATION-GUARDED-APPLY-01"
          - "CAP-STUDIO-POLICY-CANDIDATE-DETAIL-READ-01"
          - "CAP-POLICY-CANDIDATE-PROMOTION-01"
        approval_boundary: "guarded_policy_store_write"
        evidence_outputs:
          - "candidate activation plan status"
          - "proposal snapshot hash"
          - "read-set preview"
          - "policy-store write-set preview"
          - "written policy-store paths"
          - "decision record ref"
          - "active policy verification"
          - "refusal reasons when proposal is already active or not manifest-listed"
      - step_id: "STUDIO-POLICY-CONFIG-05"
        user_action: "Inspect what policy changes are possible next."
        visible_result: "Studio shows policy-management guarded operation descriptors, including distribution review, active policy configuration changes, reusable-template publication, template activation, and starter manifest publication."
        operation_chain: "The Studio action registry exposes existing no-write plan and guarded apply surfaces; the frontend renders them as operation boundaries without executing any write."
        atom_refs:
          - "CAP-STUDIO-POLICY-GUARDED-ACTION-REGISTRY-01"
          - "CAP-STUDIO-ACTION-REGISTRY-01"
        approval_boundary: "read_only_action_descriptor"
        evidence_outputs:
          - "policy operation cards"
          - "approval required tags"
      - step_id: "STUDIO-POLICY-CONFIG-06"
        user_action: "Preview a controlled active-policy configuration change."
        visible_result: "Studio shows the selected policy's current configuration, the proposed configuration change, and a no-write plan for deprecating, refining, or superseding the selected active policy, including current trigger profile, proposed trigger profile, proposal ref, future write set, refusal reasons, recommendations, and non-effects. Scope-first mode marks lifecycle chips as ignored and preserves the current declared trigger as a compatibility anchor."
        operation_chain: "The frontend posts controlled operation, trigger mode, policy scope, lifecycle event, replacement ref/title, and path-filter fields to /api/policy-management/evolution/plan; the web adapter delegates to policy_store.build_policy_evolution_plan and returns the existing policy_evolution_plan object with Studio no-write metadata. Refine previews use the same replacement_work_profile_* fields as supersession previews but target only the selected policy trigger profile."
        atom_refs:
          - "CAP-STUDIO-POLICY-EVOLUTION-PLAN-PREVIEW-01"
          - "CAP-POLICY-EVOLUTION-PLAN-PROPOSE-01"
