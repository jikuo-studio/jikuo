schema_version: "jikuo.registry.v0_draft"
registry_id: "jikuo-document-registry-index"
status: "draft"
created_at: "2026-05-17"
authority_model:
  registry_layer: "L0 product-level source of truth for structured registry entries"
  project_context_layer: "L1 project-local active subset and mount bindings"
  mount_layer: "L2 human-curated mount recipes"
  narrative_layer: "L3 human-readable projections and orientation docs"
anti_shards:
  - id: "open_items"
    reason: "Open items are a computed view over work_order and capability status, not a source shard."
shards:
  - id: "work_orders"
    path: "docs/registry/work_orders.yaml"
    authority: "source_of_truth_draft"
    projection_targets:
      - path: "docs/governance/jikuo_productization_task_map.md"
        status: "deprecated_view_after_docreg_01a"
        deprecation_target_date: "2026-06-01"
  - id: "capabilities"
    path: "docs/registry/capabilities.yaml"
    authority: "source_of_truth_draft"
    projection_targets:
      - path: "docs/governance/jikuo_productization_task_map.md#atomic-capability-registry"
        status: "deprecated_view_after_docreg_01a"
        deprecation_target_date: "2026-06-01"
  - id: "scenario_chains"
    path: "docs/registry/scenario_chains.yaml"
    authority: "source_of_truth_draft"
  - id: "mount_sets"
    path: "docs/registry/mount_sets.yaml"
    authority: "source_of_truth_draft"
external_registries:
  - id: "policy_store"
    path: ".jikuo/policies/manifest.yaml"
    authority_owner: "policy_store contract"
    layer: "L1 project-local"
  - id: "insights"
    path: "docs/insights/insights_registry.yaml"
    authority_owner: "insights workflow"
    layer: "L0 product-level"
